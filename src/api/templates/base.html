<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Game Studio AI{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #0d0d0d; color: #e0e0e0; min-height: 100vh; }
    a { color: #7eb8f7; text-decoration: none; }
    a:hover { text-decoration: underline; }
    nav { background: #111; border-bottom: 1px solid #333; padding: .75rem 1.5rem; display: flex; gap: 1.5rem; align-items: center; }
    nav strong { color: #7eb8f7; font-size: 1.1rem; }
    main { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 1.4rem; color: #7eb8f7; margin-bottom: 1rem; }
    h2 { font-size: 1.1rem; color: #aaa; margin-bottom: .75rem; }
    .card { background: #161616; border: 1px solid #2a2a2a; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; }
    .badge { display: inline-block; padding: .15rem .5rem; border-radius: 3px; font-size: .75rem; font-weight: bold; }
    .badge-running { background: #1a3a5c; color: #7eb8f7; }
    .badge-complete { background: #1a3a1a; color: #6fcf6f; }
    .badge-failed { background: #3a1a1a; color: #cf6f6f; }
    btn, .btn { display: inline-block; padding: .4rem .9rem; border-radius: 4px; border: none; cursor: pointer; font-family: inherit; font-size: .9rem; }
    .btn-primary { background: #1a4a7a; color: #e0e0e0; }
    .btn-primary:hover { background: #1f5a94; }
    .btn-success { background: #1a4a1a; color: #6fcf6f; }
    .btn-success:hover { background: #235c23; }
    .btn-danger { background: #4a1a1a; color: #cf6f6f; }
    .btn-danger:hover { background: #5c2323; }
    .stream-box { background: #111; border: 1px solid #2a2a2a; border-radius: 4px; padding: 1rem; font-size: .82rem; line-height: 1.6; height: 420px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
    .gate-box { background: #1a2a1a; border: 1px solid #3a5a3a; border-radius: 6px; padding: 1rem; margin-top: 1rem; }
    .pipeline-step { padding: .4rem .75rem; border-left: 3px solid #333; margin-bottom: .4rem; font-size: .85rem; }
    .pipeline-step.done { border-color: #6fcf6f; color: #6fcf6f; }
    .pipeline-step.active { border-color: #7eb8f7; color: #7eb8f7; }
    .pipeline-step.pending { border-color: #444; color: #666; }
    input[type=text], textarea, select { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; border-radius: 4px; padding: .4rem .7rem; font-family: inherit; font-size: .9rem; width: 100%; }
    .grid-2 { display: grid; grid-template-columns: 240px 1fr; gap: 1.5rem; }
    .sprite-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
    .sprite-card { background: #161616; border: 1px solid #2a2a2a; border-radius: 6px; padding: .75rem; text-align: center; }
    .sprite-card img { max-width: 100%; image-rendering: pixelated; border-radius: 3px; margin-bottom: .5rem; }
  </style>
</head>
<body>
  <nav>
    <strong>🎮 Game Studio AI</strong>
    <a href="/">Dashboard</a>
    <a href="/sprites">Sprites</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
