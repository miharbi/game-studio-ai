<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ doc_title }} — Docs</title>
  {% if local_assets %}
  <link href="/static/vendor/daisyui.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/vendor/marked.min.js"></script>
  {% else %}
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  {% endif %}
  <!-- DaisyUI v4 fallback hex colors are gated behind @media (prefers-color-scheme:dark).
       Re-scope them under [data-theme] so they apply in Qt WebEngine / any light-reporting UA. -->
  <style>
    [data-theme=dark]     { --fallback-b1:#1d232a; --fallback-b2:#191e24; --fallback-b3:#15191e; --fallback-bc:#a6adbb }
    [data-theme=night]    { --fallback-b1:#0f172a; --fallback-b2:#0c1425; --fallback-b3:#0a1120; --fallback-bc:#c8cbd0 }
    [data-theme=dracula]  { --fallback-b1:#282a36; --fallback-b2:#232530; --fallback-b3:#1f202a; --fallback-bc:#f8f8f2 }
    [data-theme=business] { --fallback-b1:#202020; --fallback-b2:#1c1c1c; --fallback-b3:#181818; --fallback-bc:#cdcdcd }
    [data-theme=coffee]   { --fallback-b1:#20161f; --fallback-b2:#1c131b; --fallback-b3:#181017; --fallback-bc:#c59f60 }
    /* Active nav item — explicit hex colors guaranteed contrast in every theme */
    .menu li > a.active {
      background-color: #2b3440 !important;
      color: #d7dde4 !important;
      font-weight: 600;
    }
    [data-theme=dark] .menu li > a.active,
    [data-theme=night] .menu li > a.active,
    [data-theme=dracula] .menu li > a.active,
    [data-theme=business] .menu li > a.active,
    [data-theme=coffee] .menu li > a.active {
      background-color: #3d4554 !important;
      color: #e2e8f0 !important;
    }
  </style>
  <style>
    #doc-body h1 { font-size: 1.75rem; font-weight: 700; margin: 1.5rem 0 0.75rem; border-bottom: 1px solid oklch(var(--b3)); padding-bottom: 0.4rem; }
    #doc-body h2 { font-size: 1.35rem; font-weight: 700; margin: 1.5rem 0 0.5rem; border-bottom: 1px solid oklch(var(--b3)); padding-bottom: 0.3rem; }
    #doc-body h3 { font-size: 1.1rem; font-weight: 600; margin: 1.2rem 0 0.4rem; }
    #doc-body p  { margin: 0.6rem 0; line-height: 1.7; }
    #doc-body ul, #doc-body ol { margin: 0.5rem 0 0.5rem 1.5rem; }
    #doc-body li { margin: 0.25rem 0; line-height: 1.6; }
    #doc-body code { background: oklch(var(--b3)); padding: 0.15em 0.4em; border-radius: 0.25rem; font-size: 0.875em; font-family: ui-monospace, monospace; }
    #doc-body pre  { background: oklch(var(--b3)); padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.75rem 0; }
    #doc-body pre code { background: none; padding: 0; font-size: 0.875rem; }
    #doc-body table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 0.9rem; }
    #doc-body th { background: oklch(var(--b3)); text-align: left; padding: 0.4rem 0.75rem; font-weight: 600; border: 1px solid oklch(var(--b3)/50%); }
    #doc-body td { padding: 0.4rem 0.75rem; border: 1px solid oklch(var(--b3)/50%); }
    #doc-body tr:nth-child(even) td { background: oklch(var(--b2)); }
    #doc-body a { color: oklch(var(--p)); text-decoration: underline; }
    #doc-body blockquote { border-left: 3px solid oklch(var(--p)); padding-left: 1rem; opacity: 0.8; margin: 0.75rem 0; }
    #doc-body hr { border-color: oklch(var(--b3)); margin: 1.5rem 0; }
  </style>
  <script>
    /* Apply saved theme before first paint to prevent FOUC */
    (function() {
      var t = localStorage.getItem('gs-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body class="min-h-screen bg-base-100 text-base-content">

  <!-- Top bar -->
  <header class="navbar bg-base-200 border-b border-base-300 sticky top-0 z-30 px-4 gap-4">
    <a href="/" class="btn btn-ghost btn-sm gap-2 opacity-70 hover:opacity-100">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      App
    </a>
    <div class="flex-1 flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      <span class="font-bold text-base">Game Studio AI — Docs</span>
    </div>
    <a href="/docs" target="_blank" rel="noopener" class="btn btn-ghost btn-sm gap-1 opacity-60 hover:opacity-100 text-xs">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
      Swagger UI
    </a>
    <div style="position:relative">
      <button class="btn btn-ghost btn-sm btn-square" title="Change theme" onclick="toggleThemeDropdown(event)">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/>
        </svg>
      </button>
      <div id="theme-menu" style="display:none;position:absolute;right:0;top:100%;margin-top:4px;z-index:9999;min-width:160px;background:oklch(var(--b2));border:1px solid oklch(var(--b3));border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.18);padding:4px 0">
        <div style="padding:4px 12px 2px;font-size:0.7rem;opacity:0.5;text-transform:uppercase;letter-spacing:0.05em">Light</div>
        <a data-theme-item="light" onclick="setTheme('light')" style="display:block;padding:6px 12px;cursor:pointer;font-size:0.875rem">Light</a>
        <a data-theme-item="corporate" onclick="setTheme('corporate')" style="display:block;padding:6px 12px;cursor:pointer;font-size:0.875rem">Corporate</a>
        <a data-theme-item="winter" onclick="setTheme('winter')" style="display:block;padding:6px 12px;cursor:pointer;font-size:0.875rem">Winter</a>
        <a data-theme-item="nord" onclick="setTheme('nord')" style="display:block;padding:6px 12px;cursor:pointer;font-size:0.875rem">Nord</a>
        <div style="padding:4px 12px 2px;margin-top:4px;font-size:0.7rem;opacity:0.5;text-transform:uppercase;letter-spacing:0.05em">Dark</div>
        <a data-theme-item="dark" onclick="setTheme('dark')" style="display:block;padding:6px 12px;cursor:pointer;font-size:0.875rem">Dark</a>
        <a data-theme-item="night" onclick="setTheme('night')" style="display:block;padding:6px 12px;cursor:pointer;font-size:0.875rem">Night</a>
        <a data-theme-item="dracula" onclick="setTheme('dracula')" style="display:block;padding:6px 12px;cursor:pointer;font-size:0.875rem">Dracula</a>
        <a data-theme-item="business" onclick="setTheme('business')" style="display:block;padding:6px 12px;cursor:pointer;font-size:0.875rem">Business</a>
        <a data-theme-item="coffee" onclick="setTheme('coffee')" style="display:block;padding:6px 12px;cursor:pointer;font-size:0.875rem">Coffee</a>
      </div>
    </div>
  </header>

  <div class="flex min-h-[calc(100vh-4rem)]">

    <!-- Docs sidebar -->
    <nav class="hidden lg:flex flex-col w-56 bg-base-200 border-r border-base-300 p-4 gap-1 sticky top-16 h-[calc(100vh-4rem)] overflow-y-auto shrink-0">
      <p class="text-xs uppercase tracking-wider opacity-50 font-semibold mb-2 px-2">Guides</p>
      {% for slug, title in doc_nav.items() %}
      <a href="/guide/{{ slug }}"
         class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm hover:bg-base-300 transition-colors
                {% if slug == doc_name %}bg-primary/10 text-primary font-semibold{% else %}opacity-75{% endif %}">
        {{ title }}
      </a>
      {% endfor %}
    </nav>

    <!-- Mobile nav -->
    <div class="lg:hidden w-full bg-base-200 border-b border-base-300 flex overflow-x-auto px-4 py-2 gap-2 sticky top-16 z-20">
      {% for slug, title in doc_nav.items() %}
      <a href="/guide/{{ slug }}"
         class="btn btn-sm {% if slug == doc_name %}btn-primary{% else %}btn-ghost{% endif %} whitespace-nowrap">
        {{ title }}
      </a>
      {% endfor %}
    </div>

    <!-- Content -->
    <main class="flex-1 px-8 py-8 max-w-4xl">
      <div id="doc-body"></div>
    </main>

  </div>

  <script>
    // Mark active theme in the menu
    (function() {
      var t = localStorage.getItem('gs-theme') || 'dark';
      var el = document.querySelector('[data-theme-item="' + t + '"]');
      if (el) el.style.fontWeight = '700';
    })();
    function toggleThemeDropdown(e) {
      e.stopPropagation();
      var m = document.getElementById('theme-menu');
      m.style.display = m.style.display === 'none' ? 'block' : 'none';
    }
    function setTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('gs-theme', t);
      document.querySelectorAll('[data-theme-item]').forEach(function(el) {
        el.style.fontWeight = el.dataset.themeItem === t ? '700' : '';
      });
      var m = document.getElementById('theme-menu');
      if (m) m.style.display = 'none';
    }
    // Close menu when clicking outside
    document.addEventListener('click', function() {
      var m = document.getElementById('theme-menu');
      if (m) m.style.display = 'none';
    });
    // Render markdown
    var raw = {{ markdown_content | tojson }};
    document.getElementById('doc-body').innerHTML = marked.parse(raw);
  </script>
</body>
</html>
