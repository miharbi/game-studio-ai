  # Qwen — by Alibaba / DashScope
  dashscope:
    env_key: "DASHSCOPE_API_KEY"
    models:
      - id: "dashscope/qwen-max"
        context_window: 32768
        note: "Qwen-Max — strongest Qwen model"
      - id: "dashscope/qwen-plus"
