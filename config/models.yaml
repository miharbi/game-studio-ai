# Tier → model mapping.
# Any litellm-supported model ID can be used. Prefix: openai/, anthropic/, github/, etc.
# Set TIER1_MODEL / TIER2_MODEL / TIER3_MODEL env vars to override at runtime.

tiers:
  1:
    model: "github/gpt-4.1"
    description: "Directors — highest quality, used for vision/approval gates"
  2:
    model: "github/gpt-4.1-mini"
    description: "Department leads — balanced quality/cost"
  3:
    model: "github/gpt-4.1-mini"
    description: "Specialists — fast iteration"

# Per-engine model overrides (optional)
engine_overrides:
  godot4: {}
  unity: {}
  unreal5: {}

# Sprite generation config
sprites:
  provider: "stub"          # stub | openai | stable_diffusion
  model: "dall-e-3"
  image_size: "1024x1024"

# ---------------------------------------------------------------------------
# Supported providers — reference catalog.
# All providers are accessed through litellm. Set the matching API key env var.
# Use any model ID below as a TIER*_MODEL env var or an agent model_override.
# ---------------------------------------------------------------------------
providers:
  github:
    env_key: "GITHUB_TOKEN"
    models:
      - id: "github/gpt-4.1"
        context_window: 1047576
        note: "GPT-4.1 via GitHub Models — free with Copilot"
      - id: "github/gpt-4.1-mini"
        context_window: 1047576
        note: "GPT-4.1 Mini via GitHub Models"
      - id: "github/gpt-4.1-nano"
        context_window: 1047576
        note: "GPT-4.1 Nano via GitHub Models — fastest"

  openai:
    env_key: "OPENAI_API_KEY"
    models:
      - id: "openai/gpt-4.1"
        context_window: 1047576
        note: "GPT-4.1 direct via OpenAI"
      - id: "openai/gpt-4o"
        context_window: 128000
        note: "GPT-4o multimodal"
      - id: "openai/gpt-4o-mini"
        context_window: 128000
        note: "GPT-4o Mini — cost-effective"

  anthropic:
    env_key: "ANTHROPIC_API_KEY"
